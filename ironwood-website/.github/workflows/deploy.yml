name: Deploy to Dokploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ironwood-website/my-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ironwood-website/my-app

      - name: Build
        run: npm run build
        working-directory: ironwood-website/my-app

      - name: Trigger Dokploy redeploy
        run: |
          curl -s -f -X POST "https://panel.theochinomona.tech/api/trpc/application.deploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -d '{"json":{"applicationId":"g9H3njg1-vNp3eHMIuP-3"}}'
